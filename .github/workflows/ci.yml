name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: omkark158/ai-task-frontend:${{ github.sha }},omkark158/ai-task-frontend:latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: omkark158/ai-task-backend:${{ github.sha }},omkark158/ai-task-backend:latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: omkark158/ai-task-worker:${{ github.sha }},omkark158/ai-task-worker:latest

      - name: Update image tags in infra repo
        uses: actions/checkout@v3
        with:
          repository: omkark158/ai-task-platform-infra
          token: ${{ secrets.GH_PAT }}
          path: infra

      - name: Patch image tags
        run: |
          sed -i "s|omkark158/ai-task-frontend:.*|omkark158/ai-task-frontend:${{ github.sha }}|g" infra/k8s/frontend/deployment.yaml
          sed -i "s|omkark158/ai-task-backend:.*|omkark158/ai-task-backend:${{ github.sha }}|g" infra/k8s/backend/deployment.yaml
          sed -i "s|omkark158/ai-task-worker:.*|omkark158/ai-task-worker:${{ github.sha }}|g" infra/k8s/worker/deployment.yaml

      - name: Commit and push infra changes
        run: |
          cd infra
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }}"
          git push